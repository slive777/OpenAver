                            <!-- 99a-T3：焦點裁切遮罩 overlay（亮窗＝小格保留區；窗外 box-shadow spotlight 壓暗；
                                 一律 force-detect 預覽，左右拖曳微調，✓/✗ 於 .cover-actions 提交/取消；
                                 點窗外 = ✗）。 -->
                            <!-- 98b-T6：移除 x-transition.opacity——實測其 enter transition 會卡在 opacity:0
                                 (_x_transitioning 永真) 使遮罩雖 display:block 卻全透明看不見。功能性遮罩
                                 不需淡入，x-show 即時顯示更可靠（亦符 owner 克制取向）。 -->
                            <!-- 100b-T1（CD-4/§B-1a）：遮罩 DOM 共用 partial（Jinja include，非 macro——
                                 內全是 Alpine directive，macro 的參數化沒有價值，且會踩 _macros/ 的
                                 autoescape vs Alpine 屬性坑）。include 是編譯期文字插入，展開後仍在原
                                 x-data scope 內、_mask* state 直接可用，不需傳參。
                                 **目前只有 video 分支 include 它**；女優分支的第二個 include 屬 T2（§B-1c），
                                 且**必須與「同步 reset」一起落地**——T1 曾試著先 include，CDP 實測（2/2 重現）

                            <div class="lb-mask-overlay"
                                 x-show="_maskVisible"
                                 @click.self="cancelMask()">
                                <!-- 99a-T5→101b-T2（CD-2/CD-4a）：窗只在偵測完成（_maskDetecting 翻 false）

                                     任何一幀都不是「先貼右裁基準」的基準幾何（無基準閃現過渡態）。 -->
                                <div class="lb-mask-window"
                                     x-show="_maskVisible && !_maskDetecting"
                                     :style="_maskWinStyle"
                                     :class="{'lb-mask-window--dragging': _maskDragging, 'lb-mask-window--settling': _maskSettling}"
                                     @pointerdown="_maskDragStart($event)"></div>
                                <!-- 100c-T3a：唯一可拖方向恆為橫向（CD-6），cursor:ew-resize 併回

                                <div class="lb-mask-wait-burst" x-show="_maskDetecting || _maskSettling" aria-hidden="true">

                                    <svg class="sparkle-star" data-sparkle-size="sm" style="--cx: 46%; --cy: 66%;" viewBox="-12 -12 24 24"><polygon points="0,-10 2,-2 10,0 2,2 0,10 -2,2 -10,0 -2,-2"/></svg>
                                    <svg class="sparkle-star" data-sparkle-size="md" style="--cx: 76%; --cy: 70%;" viewBox="-12 -12 24 24"><polygon points="0,-10 2,-2 10,0 2,2 0,10 -2,2 -10,0 -2,-2"/></svg>
