[pytest]
pythonpath = .
testpaths = tests
addopts = -v
asyncio_mode = auto
markers =
    smoke: tests that connect to external services (deselect with '-m "not smoke"')
    integration: marks tests that require external services
    e2e: browser end-to-end tests (require real network; run in a SEPARATE process via `pytest tests/e2e` — never bundled with async tests in one `pytest tests/` run: pytest-playwright's session `playwright` fixture leaves a running asyncio loop that breaks pytest-asyncio Runner. deselect with '-m "not e2e"')
    perf: performance benchmarks (deselect with '-m "not perf"')
